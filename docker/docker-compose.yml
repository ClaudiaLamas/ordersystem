version: "3.8"
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: mssql
    restart: unless-stopped
    environment:
      SA_PASSWORD: "EgitronTestBE#2025"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
